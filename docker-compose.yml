version: '3.8'

services:
  # ASP.NET Core API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      JWT_KEY: ${JWT_KEY:-your_super_secret_key_minimum_32_characters_long_for_development}
      MongoDB__ConnectionString: mongodb://mongo:27017/chatdb
      Redis__ConnectionString: redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-network
    restart: unless-stopped
    volumes:
      - ./apiContact/wwwroot:/app/wwwroot

  # MongoDB Database
  mongo:
    image: mongo:7.0-alpine
    container_name: chat-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: chatdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: chat-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD:-redis123} ping
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Express (Admin UI) - Development only
  mongo-express:
    image: mongo-express:latest
    container_name: chat-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - chat-network
    restart: unless-stopped
    profiles:
      - dev

  # Redis Commander (Admin UI) - Development only
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: chat-redis-commander
    environment:
      REDIS_HOSTS: default:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - chat-network
    restart: unless-stopped
    profiles:
      - dev

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local

networks:
  chat-network:
    driver: bridge
